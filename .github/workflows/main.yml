name: Build APK
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev \
          libncurses5-dev libncursesw5-dev libtinfo6 cmake libffi-dev libssl-dev \
          python3-pip python3-setuptools

      - name: Install Buildozer & Cython
        run: |
          python3 -m pip install --user --upgrade buildozer cython==0.29.33 --break-system-packages

      - name: Build with Buildozer
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Perintah 'yes' di sini hanya untuk jaga-jaga ekstra
          yes | buildozer android debug
